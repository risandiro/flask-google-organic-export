<!DOCTYPE html>

<html lang="cs">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
        <title>Inizio - Jednoduchý Web Scraper</title>
    </head>  
    <body>

        <header>
            <h1>Export výsledků vyhledávání</h1>
            <p>Organické výsledky z první strany Google, uložení ve formátu JSON.</p>
        </header> 

        <div class="container">
            <div class="section">
                <form action="/" method="post">
                    <input name="query" placeholder="Napiš výraz..." type="text" required>
                    <input type="submit" value="Exportuj">
                </form>
                {% if error %}
                    <p class="error">{{ error }}</p>
                {% endif %}
            </div>
        </div>

    </body>
</html>
